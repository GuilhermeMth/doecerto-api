name: CI/CD - DoeCerto API

on:
  push:
    branches: [main, develop, distributed-systems]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/doecerto-api

jobs:
  # ============================================
  # JOB 1: Lint e Validação
  # ============================================
  lint:
    name: 🔍 Lint & Validate
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: 📚 Install Dependencies
        run: npm ci
      
      - name: 🔧 Generate Prisma Client
        run: npx prisma generate
      
      - name: 🧹 Run Linter
        run: npm run lint || true
      
      - name: ✅ Validate Prisma Schema
        run: npx prisma validate

  # ============================================
  # JOB 2: Build Imagem Docker
  # ============================================
  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: lint
    
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🔐 Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: 🏗️ Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host
      
      - name: 🏷️ Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=DoeCerto API
            org.opencontainers.image.description=Backend API for DoeCerto Platform
            org.opencontainers.image.vendor=DoeCerto Team
      
      - name: 🚀 Build and Push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            NODE_ENV=production
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
      
      - name: 📋 Image Digest
        run: "echo 'Image digest: ${{ steps.build.outputs.digest }}'"

  # ============================================
  # JOB 3: Security Scan
  # ============================================
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write
      contents: read
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🔐 Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: 🛡️ Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image-tag }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
      
      - name: 📊 Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ============================================
  # JOB 4: Criar Release Notes
  # ============================================
  release-notes:
    name: 📝 Generate Release Notes
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 📝 Generate Changelog
        id: changelog
        run: |
          echo "## 🚀 Changes in this release" > release-notes.md
          echo "" >> release-notes.md
          git log --pretty=format:"- %s (%h)" $(git describe --tags --abbrev=0 2>/dev/null || echo HEAD~10)..HEAD >> release-notes.md || echo "- Initial release" >> release-notes.md
          cat release-notes.md
      
      - name: 📤 Upload Release Notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md
          retention-days: 30

  # ============================================
  # JOB 5: Notificação de Sucesso
  # ============================================
  notify:
    name: 📢 Notify Success
    runs-on: ubuntu-latest
    needs: [build, security]
    if: success() && github.ref == 'refs/heads/main'
    
    steps:
      - name: ✅ Success Message
        run: |
          echo "🎉 CI/CD Pipeline completed successfully!"
          echo "📦 Image: ${{ env.IMAGE_NAME }}:latest"
          echo "🔖 Digest: ${{ needs.build.outputs.image-digest }}"