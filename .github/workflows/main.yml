name: Docker Build and Push - Distributed Systems

on:
  push:
    branches:
      - distributed-systems

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Push to Registry
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Substitua 'seu-usuario' pelo nome do seu perfil ou use a variável
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/doecerto-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/doecerto-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker Scout Scan
        uses: docker/scout-action@v1
        with:
          command: quickview,cves
          image: ${{ secrets.DOCKERHUB_USERNAME }}/doecerto-api:latest
          only-severities: critical
          exit-code: true