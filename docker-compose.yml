services:
  # --- BANCO DE DADOS (MySQL) ---
  db:
    image: mysql:8
    container_name: doecerto_db
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: America/Sao_Paulo
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3309:3306" # Acessível no seu PC via 3309 (evita conflito com o 3306/3307)
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # --- CACHE (Redis) ---
  redis:
    image: redis:7-alpine
    container_name: doecerto_redis
    restart: always
    env_file:
      - .env
    ports:
      - "6479:6379" # Acessível no seu PC via 6479
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - app_network

  # --- SUA API (NestJS) ---
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doecerto_app
    restart: always
    ports:
      - "3501:3501" # Acessível no seu PC via 3501 (conforme seu .env novo)
    env_file:
      - .env
    environment:
      # Conexão interna usa o nome do serviço 'db' na porta padrão 3306
      DATABASE_URL: "mysql://root:${MYSQL_ROOT_PASSWORD}@db:3306/${MYSQL_DATABASE}"
      REDIS_HOST: "redis"
      REDIS_PORT: 6379
      PORT: 3501
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  mysql_data:
  redis_data: