services:
  # --- BANCO DE DADOS (MySQL) ---
  db:
    image: mysql:8
    container_name: doecerto_db
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: America/Sao_Paulo
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3309:3306" # Acessível no seu PC via 3309 (evita conflito com o 3306/3307)
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # --- CACHE (Redis) ---
  # Redis service removed (caused deploy issues)

networks:
  app_network:
    driver: bridge

volumes:
  mysql_data:
  # redis_data removed